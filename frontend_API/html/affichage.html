    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="App Météo Cameroun — Donnez votre avis">
    <meta name="twitter:description" content="Consultez la météo en temps réel au Cameroun.">
    <meta name="twitter:image" content="https://i.ibb.co/YBN2DpFw/Weather.jpeg">
    <meta name="twitter:image:alt" content="Aperçu de l'application météo Cameroun">

    <!-- ====== ICÔNE & FAVICON ====== -->
    <link rel="shortcut icon" href="https://i.ibb.co/YBN2DpFw/Weather.jpeg" type="image/x-icon">
    <link rel="apple-touch-icon" href="https://i.ibb.co/YBN2DpFw/Weather.jpeg">
   
    <meta property="og:type" content="website">
    <link rel="shortcut icon" href="../image/Weather.jpeg" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Montaga&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=partly_cloudy_day" />

    <title>page_resultat</title>

</head>

<body class="min-h-screen bg-cover bg-center bg-[url('../image/ciel.jpg')]" id="corps">

   <div class="w-full bg-white flex h-[5vh] items-center justify-between px-4">
 
        <!-- Logo -->
        <h1 class="w-fit bg-clip-text text-transparent bg-linear-to-r from-blue-700 to-blue-200 font-bold text-2xl cursor-pointer"
            id="meteo">
            METEO 237
        </h1>
        <a href="../html/formulaire.html" class="sm:block text-blue-700 font-semibold text-sm hover:underline hidden">
    Vos avis
</a>
        <!-- Lien visible sur grand écran -->
        <div id="menu-mobile" class="sm:hidden absolute top-[5vh] left-0 w-full bg-white shadow-md z-50">
            <a href="../html/formulaire.html"
                class="block px-6 py-4 text-gray-700 hover:bg-blue-50 hover:text-blue-700 border-b border-gray-100 text-sm font-bold">
                Vos avis
            </a> 
        </div>         

        <!-- Bouton hamburger visible sur mobile -->
        <button id="hamburger" class="sm:hidden flex flex-col gap-1.5 cursor-pointer p-2">
            <span class="ham-line block w-6 h-0.5 bg-blue-700 transition-all duration-300"></span>
            <span class="ham-line block w-6 h-0.5 bg-blue-700 transition-all duration-300"></span>
            <span class="ham-line block w-6 h-0.5 bg-blue-700 transition-all duration-300"></span>
        </button>

    </div>


    <!-- CONTAINER PRINCIPAL -->
    <main class="flex  items-center justify-center h-screen">

        <!-- CONTAINER secondaire-->
        <div class="w-[95%] sm:w-[80%] md:w-[60%] lg:w-[40%] rounded-3xl overflow-hidden shadow-2xl ">

            <!-- bouton retour -->

            <a href="./index.html">
                <button
                    class="absolute top-24 left-2 bg-white/20 hover:bg-white/30 backdrop-blur-md px-3 py-2 rounded-full text-white text-lg transition animate-bounce"
                    id="retour">⬅️</button>

            </a>
            <!-- CARD FLOUE -->
            <div class="backdrop-blur-xl bg-white/10 p-6 sm:p-8 text-white"> <!-- logo nuage-->
                <div class="">
                    <span class="material-symbols-outlined w-[6vw] animate-bounce">
                        partly_cloudy_day
                    </span>
                    <hr class="h-4 text-blue-100">
                </div>

                <!-- INFOS PRINCIPALES -->
                <div class="text-center mb-6">
                    <div class="flex justify-center">
                        <img id="icone-meteo" alt="icone météo">
                    </div>

                    <h1 class="text-2xl sm:text-3xl font-semibold" id="city">Yaoundé, Cameroun</h1>
                    <p class="text-5xl sm:text-6xl font-bold my-2" id="temp">20°C</p>
                    <p class="text-lg sm:text-xl opacity-80" id="description">Ciel glacé</p>
                </div>

            </div>

            <!-- BARRE BAS (NOIRE FLOUE) -->
            <div class="bg-black/40 backdrop-blur-lg text-white px-4 py-4">

                <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 text-center">

                    <div class="flex flex-col">
                        <span class="text-sm opacity-70">💧 Humidité</span>
                        <span class="font-semibold" id="humidity">65%</span>
                    </div>

                    <div class="flex flex-col">
                        <span class="text-sm opacity-70">💨 Vent</span>
                        <span class="font-semibold" id="wind">10 km/h</span>
                    </div>

                    <div class="flex flex-col">
                        <span class="text-sm opacity-70">📊 Pression</span>
                        <span class="font-semibold" id="pression">1012 hPa</span>
                    </div>

                    <div class="flex flex-col">
                        <span class="text-sm opacity-70">🌅 Lever du soleil</span>
                        <span class="font-semibold" id="sunrise">06:15</span>
                    </div>

                </div>

            </div>

        </div>

    </main>

    <script src="../js/script2.js"></script>

</body>

</html>
